name: Spring Boot CI

on:
  push:
    branches:
      - master
      - Mahima

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true  

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Java 21
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '21'

      - name: Make Maven Wrapper executable
        run: chmod +x ./mvnw

      - name: Build with Maven Wrapper
        run: ./mvnw clean package -DskipTests

      - name: List target folder
        run: ls -l target/

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      # Build Docker image (without copying .env)
      - name: Build Docker Image
        run: docker build -t bhashitha22/backend:latest .

      # Push Docker image
      - name: Push Docker Image
        run: docker push bhashitha22/backend:latest

      # Optional: Run container with secrets (example)
      - name: Run Docker container with secrets
        run: |
          docker run -d -p 9090:9090 \
            -e SPRING_DATASOURCE_URL=${{ secrets.DB_URL }} \
            -e SPRING_DATASOURCE_USERNAME=${{ secrets.DB_USER }} \
            -e SPRING_DATASOURCE_PASSWORD=${{ secrets.DB_PASSWORD }} \
            bhashitha22/backend:latest